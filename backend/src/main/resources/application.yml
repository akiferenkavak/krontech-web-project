spring:
  application:
    name: backend

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

  cache:
    type: redis
    redis:
      time-to-live: 3600000
      cache-null-values: false

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  admin:
    email: ${APP_ADMIN_EMAIL:admin@krontech.com}
    password: ${APP_ADMIN_PASSWORD:admin123}
  cookie:
    secure: ${APP_COOKIE_SECURE:false}
    max-age-seconds: 86400
  frontend:
    url: ${FRONTEND_URL:http://frontend:3000}
  revalidate:
    secret: ${REVALIDATE_SECRET:krontech-revalidate-secret}
  recaptcha:
    secret: ${RECAPTCHA_SECRET_KEY} 

logging:
  level:
    com.krontech: DEBUG
    org.springframework.web: DEBUG